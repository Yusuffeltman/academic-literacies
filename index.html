<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Literacies in the Age of AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script type="module" src="/src/main.js"></script>

  <style>
    :root {
      --navy:#0f172a;--amber:#fbbf24;--amber2:#f59e0b;
      --amber-dim:rgba(251,191,36,.12);--border:rgba(0,0,0,.08);
      --cream:#f8fafc;--muted:#64748b;--radius-sm:10px;
      --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lora',Georgia,serif;background:var(--navy);height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    #auth-screen{width:100%;max-width:500px;}
    .auth-box{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35);}
    .auth-hero{padding:50px 40px;background:linear-gradient(135deg,#0f172a,#1e1b4b,#171717);color:#fff;text-align:center;}
    .auth-hero-logo{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;font-weight:700;text-transform:uppercase;color:var(--amber);margin-bottom:12px;}
    .auth-hero-title{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;color:#fff;line-height:1.3;}
    .auth-hero-sub{color:rgba(255,255,255,.6);font-style:italic;font-size:14px;}
    .auth-tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
    .auth-tab{padding:18px;text-align:center;cursor:pointer;color:var(--muted);font-weight:700;font-size:14px;transition:var(--transition);border:none;background:#fff;font-family:'Lora',serif;}
    .auth-tab.on{color:#1e293b;border-bottom:3px solid var(--amber);}
    .auth-body{padding:40px;}
    .auth-form{display:none;}
    .auth-form.on{display:block;}
    .auth-field{margin-bottom:22px;}
    .auth-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'DM Mono',monospace;}
    .auth-field input{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--cream);transition:var(--transition);font-family:'Lora',serif;}
    .auth-field input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 4px var(--amber-dim);background:#fff;}
    .auth-submit{width:100%;padding:15px;background:var(--amber);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:var(--transition);font-family:'Lora',serif;}
    .auth-submit:hover{background:var(--amber2);transform:translateY(-2px);}
    .role-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;}
    .role-opt{border:1px solid var(--border);padding:12px 8px;text-align:center;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;background:var(--cream);transition:var(--transition);}
    .role-opt.active{border-color:var(--amber);background:var(--amber-dim);}
    .auth-err{color:#ef4444;font-size:13px;margin-bottom:12px;min-height:18px;}
    #app{display:none;}
  </style>
</head>
<body>
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-hero">
        <div class="auth-hero-logo">ACADLIT · AI</div>
        <h1 class="auth-hero-title">Academic Literacies<br>in the Age of AI</h1>
        <p class="auth-hero-sub">Your learning environment. Sign in to continue.</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab on" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">Register</button>
      </div>
      <div class="auth-body">
        <div class="auth-form on" id="form-login">
          <div class="auth-field"><label>Email</label><input type="email" id="login-email" placeholder="you@university.ac" /></div>
          <div class="auth-field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" onkeypress="if(event.key==='Enter') document.getElementById('btn-login').click()" /></div>
          <p class="auth-err" id="login-err"></p>
          <button class="auth-submit" id="btn-login">Sign In</button>
        </div>
        <div class="auth-form" id="form-reg">
          <div class="auth-field"><label>Display Name</label><input type="text" id="reg-name" placeholder="Your full name" /></div>
          <div class="auth-field"><label>Email</label><input type="email" id="reg-email" placeholder="you@university.ac" /></div>
          <div class="auth-field"><label>Password</label><input type="password" id="reg-pass" placeholder="At least 6 characters" /></div>
          <div class="auth-field">
            <label>Role</label>
            <div class="role-selector">
              <div class="role-opt active" data-role="student" onclick="selectRole(this)">Student</div>
              <div class="role-opt" data-role="lecturer" onclick="selectRole(this)">Lecturer</div>
              <div class="role-opt" data-role="tutor" onclick="selectRole(this)">Tutor</div>
            </div>
          </div>
          <p class="auth-err" id="reg-err"></p>
          <button class="auth-submit" id="btn-reg">Create Account</button>
        </div>
      </div>
    </div>
  </div>
  <div id="app"></div>
  <script>
    function switchTab(tab){
      ['login','reg'].forEach(t=>{
        document.getElementById('form-'+t).classList.toggle('on',t===tab);
        document.getElementById('tab-'+t).classList.toggle('on',t===tab);
      });
    }
    function selectRole(el){
      document.querySelectorAll('.role-opt').forEach(r=>r.classList.remove('active'));
      el.classList.add('active');
    }
    
    // Service Worker disabled for Moodle/LMS compatibility
    /*
    if ('serviceWorker' in navigator) { ... }
    */
  </script>
</body>
</html>
