<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALE00Y1 · AI Writing Coach</title>
<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body style="margin:0;padding:0;background:#08080f;color:#f0ece3;font-family:Arial,sans-serif;min-height:100vh;">

<!-- Header -->
<div style="background:linear-gradient(135deg,#0f0f1c,#12121f);border-bottom:1px solid rgba(0,212,180,0.2);padding:20px 24px;text-align:center;">
  <div style="max-width:800px;margin:0 auto;">
    <div style="font-size:11px;letter-spacing:3px;color:#00d4b4;text-transform:uppercase;margin-bottom:6px;font-weight:700;">ALE00Y1 · Academic Literacies</div>
    <h1 style="margin:0;font-size:26px;font-weight:800;background:linear-gradient(135deg,#00d4b4,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">AI Writing Coach</h1>
    <p style="margin:8px 0 0;font-size:13px;color:rgba(240,236,227,0.5);">Paste your writing below for structured academic feedback</p>
  </div>
</div>

<!-- Main -->
<div style="max-width:800px;margin:0 auto;padding:32px 24px;">

  <!-- API Key input -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Anthropic API Key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-..." style="width:100%;box-sizing:border-box;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;color:#f0ece3;font-size:14px;font-family:Arial,sans-serif;outline:none;" />
    <div style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;">Your key is never stored — it only lives in this page session.</div>
  </div>

  <!-- Writing input -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Your Writing</label>
    <textarea id="writingInput" placeholder="Paste your paragraph, essay section, or full draft here..." style="width:100%;box-sizing:border-box;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px;color:#f0ece3;font-size:15px;font-family:Arial,sans-serif;min-height:200px;resize:vertical;outline:none;line-height:1.6;"></textarea>
    <div id="charCount" style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;text-align:right;">0 characters</div>
  </div>

  <!-- Warning message -->
  <div id="warnMsg" style="display:none;background:rgba(255,107,91,0.12);border:1px solid rgba(255,107,91,0.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;color:#ff6b5b;"></div>

  <!-- Submit button -->
  <button id="submitBtn" onclick="getFeedback()" style="background:linear-gradient(135deg,#00d4b4,#4fc3f7);color:#08080f;font-weight:800;padding:14px 28px;border-radius:100px;font-size:15px;border:none;cursor:pointer;width:100%;letter-spacing:0.5px;">Get Feedback</button>

  <!-- Spinner -->
  <div id="spinner" style="display:none;text-align:center;padding:40px 0;">
    <div style="width:36px;height:36px;border:3px solid rgba(0,212,180,0.2);border-top-color:#00d4b4;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
    <div style="font-size:13px;color:rgba(240,236,227,0.5);">Analysing your writing...</div>
  </div>

  <!-- Results panel -->
  <div id="results" style="display:none;margin-top:28px;animation:fadeIn 0.4s ease;"></div>

</div>

<!-- Footer -->
<div style="text-align:center;padding:24px;font-size:11px;color:rgba(240,236,227,0.25);border-top:1px solid rgba(255,255,255,0.05);margin-top:20px;">
  ALE00Y1 · Academic Literacies · UJ · 2026
</div>

<script>
const writingInput = document.getElementById('writingInput');
const charCount = document.getElementById('charCount');

writingInput.addEventListener('input', function() {
  charCount.textContent = this.value.length + ' characters';
});

writingInput.addEventListener('focus', function() {
  this.style.borderColor = 'rgba(0,212,180,0.5)';
});
writingInput.addEventListener('blur', function() {
  this.style.borderColor = 'rgba(255,255,255,0.1)';
});

function showWarn(msg) {
  const w = document.getElementById('warnMsg');
  w.textContent = msg;
  w.style.display = 'block';
  setTimeout(() => { w.style.display = 'none'; }, 4000);
}

function scoreColor(score) {
  if (score >= 4) return '#00d4b4';
  if (score >= 3) return '#ffd166';
  return '#ff6b5b';
}

function scoreDots(score, max) {
  let html = '';
  for (let i = 1; i <= max; i++) {
    const filled = i <= score;
    html += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px;background:' + (filled ? scoreColor(score) : 'rgba(255,255,255,0.1)') + ';"></span>';
  }
  return html;
}

function parseAndRender(text) {
  const sections = text.split(/\n(?=##\s)/);
  let html = '';

  sections.forEach(section => {
    section = section.trim();
    if (!section) return;

    // Top 3 Suggestions section
    if (section.startsWith('## Top 3 Suggestions')) {
      const lines = section.split('\n').filter(l => l.trim());
      const title = lines[0].replace('## ', '');
      const items = lines.slice(1).filter(l => /^\d\./.test(l.trim()));

      html += '<div style="background:#0f0f1c;border:1px solid rgba(0,212,180,0.25);border-radius:12px;padding:20px 24px;margin-bottom:16px;">';
      html += '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#00d4b4;text-transform:uppercase;margin-bottom:14px;">' + title + '</div>';
      items.forEach((item, idx) => {
        const content = item.replace(/^\d\.\s*/, '');
        html += '<div style="display:flex;gap:12px;margin-bottom:10px;align-items:flex-start;">';
        html += '<div style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#00d4b4,#4fc3f7);color:#08080f;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;">' + (idx + 1) + '</div>';
        html += '<div style="font-size:14px;color:#f0ece3;line-height:1.5;padding-top:3px;">' + content + '</div>';
        html += '</div>';
      });
      html += '</div>';
      return;
    }

    // Scored section (## Heading [X/5])
    const scoreMatch = section.match(/\[(\d+)\s*\/\s*5\]/);
    if (scoreMatch && section.startsWith('##')) {
      const score = parseInt(scoreMatch[1]);
      const lines = section.split('\n').filter(l => l.trim());
      const rawTitle = lines[0].replace('## ', '').replace(/\[.*\]/, '').trim();
      const body = lines.slice(1).join(' ').trim();
      const color = scoreColor(score);

      html += '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.06);border-left:3px solid ' + color + ';border-radius:12px;padding:20px 24px;margin-bottom:16px;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
      html += '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.5);text-transform:uppercase;">' + rawTitle + '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;">';
      html += '<div style="font-size:18px;font-weight:800;color:' + color + ';">' + score + '<span style="font-size:13px;color:rgba(240,236,227,0.4);">/5</span></div>';
      html += '<div>' + scoreDots(score, 5) + '</div>';
      html += '</div></div>';
      html += '<p style="margin:0;font-size:14px;color:rgba(240,236,227,0.8);line-height:1.6;">' + body + '</p>';
      html += '</div>';
      return;
    }

    // Generic section
    if (section.startsWith('##')) {
      const lines = section.split('\n').filter(l => l.trim());
      const title = lines[0].replace('## ', '');
      const body = lines.slice(1).join('\n').trim();
      html += '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px 24px;margin-bottom:16px;">';
      html += '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.5);text-transform:uppercase;margin-bottom:10px;">' + title + '</div>';
      html += '<p style="margin:0;font-size:14px;color:rgba(240,236,227,0.8);line-height:1.6;">' + body + '</p>';
      html += '</div>';
    }
  });

  return html;
}

async function getFeedback() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const text = writingInput.value.trim();

  if (!apiKey) { showWarn('Please enter your Anthropic API key above.'); return; }
  if (!text) { showWarn('Please paste your writing first.'); return; }
  if (text.length < 50) { showWarn('Please paste at least a paragraph for meaningful feedback.'); return; }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const results = document.getElementById('results');

  btn.style.display = 'none';
  spinner.style.display = 'block';
  results.style.display = 'none';

  const systemPrompt = `You are an academic writing coach for first-year university students.
Analyse the submitted writing and provide structured feedback in exactly this format:

## Argument Clarity [score /5]
[2-3 sentences of specific feedback]

## Use of Evidence [score /5]
[2-3 sentences of specific feedback]

## Academic Tone [score /5]
[2-3 sentences of specific feedback]

## Structure [score /5]
[2-3 sentences of specific feedback]

## Top 3 Suggestions
1. [specific actionable suggestion]
2. [specific actionable suggestion]
3. [specific actionable suggestion]

Be encouraging but honest. Use plain English, not jargon.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-request-source': 'browser'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1200,
        system: systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error && err.error.message ? err.error.message : 'API error ' + response.status);
    }

    const data = await response.json();
    const feedbackText = data.content[0].text;

    results.innerHTML =
      '<div style="border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:20px;margin-bottom:24px;">' +
      '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#00d4b4;text-transform:uppercase;margin-bottom:4px;">Feedback</div>' +
      '<div style="font-size:12px;color:rgba(240,236,227,0.35);">Review each area below and focus on the top suggestions</div>' +
      '</div>' +
      parseAndRender(feedbackText) +
      '<button onclick="resetForm()" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.6);padding:12px 24px;border-radius:100px;font-size:13px;cursor:pointer;margin-top:8px;font-family:Arial,sans-serif;width:100%;">Try Another Piece of Writing</button>';

    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    results.innerHTML = '<div style="background:rgba(255,107,91,0.1);border:1px solid rgba(255,107,91,0.3);border-radius:12px;padding:20px 24px;color:#ff6b5b;font-size:14px;line-height:1.5;">' +
      '<strong>Something went wrong</strong><br>' + (err.message || 'Please check your API key and try again.') +
      '</div>';
    results.style.display = 'block';
  } finally {
    spinner.style.display = 'none';
    btn.style.display = 'block';
  }
}

function resetForm() {
  writingInput.value = '';
  charCount.textContent = '0 characters';
  document.getElementById('results').style.display = 'none';
  writingInput.focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
