<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALE00Y1 · Source Evaluator</title>
<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body style="margin:0;padding:0;background:#08080f;color:#f0ece3;font-family:Arial,sans-serif;min-height:100vh;">

<!-- Header -->
<div style="background:linear-gradient(135deg,#0f0f1c,#12121f);border-bottom:1px solid rgba(0,212,180,0.2);padding:20px 24px;text-align:center;">
  <div style="max-width:800px;margin:0 auto;">
    <div style="font-size:11px;letter-spacing:3px;color:#00d4b4;text-transform:uppercase;margin-bottom:6px;font-weight:700;">ALE00Y1 · Academic Literacies</div>
    <h1 style="margin:0;font-size:26px;font-weight:800;background:linear-gradient(135deg,#00d4b4,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Source Evaluator</h1>
    <p style="margin:8px 0 0;font-size:13px;color:rgba(240,236,227,0.5);">Assess the credibility and quality of any academic source</p>
  </div>
</div>

<!-- Main -->
<div style="max-width:800px;margin:0 auto;padding:32px 24px;">

  <!-- API Key -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Anthropic API Key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-..." style="width:100%;box-sizing:border-box;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;color:#f0ece3;font-size:14px;font-family:Arial,sans-serif;outline:none;" />
    <div style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;">Your key is never stored — it only lives in this page session.</div>
  </div>

  <!-- Source type toggles -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Source Type (optional)</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      <button class="type-btn" onclick="toggleType(this,'Journal Article')" style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.7);padding:8px 16px;border-radius:100px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">Journal Article</button>
      <button class="type-btn" onclick="toggleType(this,'News Article')" style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.7);padding:8px 16px;border-radius:100px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">News Article</button>
      <button class="type-btn" onclick="toggleType(this,'Website')" style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.7);padding:8px 16px;border-radius:100px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">Website</button>
      <button class="type-btn" onclick="toggleType(this,'Social Media')" style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.7);padding:8px 16px;border-radius:100px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">Social Media</button>
      <button class="type-btn" onclick="toggleType(this,'Other')" style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.7);padding:8px 16px;border-radius:100px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">Other</button>
    </div>
  </div>

  <!-- Input -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Paste a URL, Abstract, or Article Excerpt</label>
    <textarea id="sourceInput" placeholder="Paste the URL, abstract, title, or any excerpt from the source you want to evaluate..." style="width:100%;box-sizing:border-box;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px;color:#f0ece3;font-size:15px;font-family:Arial,sans-serif;min-height:160px;resize:vertical;outline:none;line-height:1.6;"></textarea>
    <div id="charCount" style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;text-align:right;">0 characters</div>
  </div>

  <!-- Warning -->
  <div id="warnMsg" style="display:none;background:rgba(255,107,91,0.12);border:1px solid rgba(255,107,91,0.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;color:#ff6b5b;"></div>

  <!-- Button -->
  <button id="submitBtn" onclick="evaluateSource()" style="background:linear-gradient(135deg,#00d4b4,#4fc3f7);color:#08080f;font-weight:800;padding:14px 28px;border-radius:100px;font-size:15px;border:none;cursor:pointer;width:100%;letter-spacing:0.5px;">Evaluate Source</button>

  <!-- Spinner -->
  <div id="spinner" style="display:none;text-align:center;padding:40px 0;">
    <div style="width:36px;height:36px;border:3px solid rgba(0,212,180,0.2);border-top-color:#00d4b4;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
    <div style="font-size:13px;color:rgba(240,236,227,0.5);">Evaluating source credibility...</div>
  </div>

  <!-- Results -->
  <div id="results" style="display:none;margin-top:28px;animation:fadeIn 0.4s ease;"></div>

</div>

<!-- Footer -->
<div style="text-align:center;padding:24px;font-size:11px;color:rgba(240,236,227,0.25);border-top:1px solid rgba(255,255,255,0.05);margin-top:20px;">
  ALE00Y1 · Academic Literacies · UJ · 2026
</div>

<script>
let selectedType = '';

const sourceInput = document.getElementById('sourceInput');
const charCount = document.getElementById('charCount');

sourceInput.addEventListener('input', function() {
  charCount.textContent = this.value.length + ' characters';
});
sourceInput.addEventListener('focus', function() { this.style.borderColor = 'rgba(0,212,180,0.5)'; });
sourceInput.addEventListener('blur', function() { this.style.borderColor = 'rgba(255,255,255,0.1)'; });

function toggleType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b => {
    b.style.background = '#0f0f1c';
    b.style.borderColor = 'rgba(255,255,255,0.12)';
    b.style.color = 'rgba(240,236,227,0.7)';
  });
  if (selectedType === type) {
    selectedType = '';
  } else {
    selectedType = type;
    btn.style.background = 'rgba(0,212,180,0.15)';
    btn.style.borderColor = '#00d4b4';
    btn.style.color = '#00d4b4';
  }
}

function showWarn(msg) {
  const w = document.getElementById('warnMsg');
  w.textContent = msg;
  w.style.display = 'block';
  setTimeout(() => { w.style.display = 'none'; }, 4000);
}

function scoreColor(score) {
  if (score >= 8) return { bg: '#00d4b4', text: '#08080f' };
  if (score >= 5) return { bg: '#ffd166', text: '#08080f' };
  return { bg: '#ff6b5b', text: '#ffffff' };
}

function verdictStyle(verdict) {
  const v = verdict.toLowerCase();
  if (v.includes('suitable for academic')) return { bg: 'rgba(0,212,180,0.1)', border: 'rgba(0,212,180,0.3)', icon: '✓', iconColor: '#00d4b4' };
  if (v.includes('use with caution')) return { bg: 'rgba(255,209,102,0.1)', border: 'rgba(255,209,102,0.3)', icon: '⚠', iconColor: '#ffd166' };
  return { bg: 'rgba(255,107,91,0.1)', border: 'rgba(255,107,91,0.3)', icon: '✗', iconColor: '#ff6b5b' };
}

function renderResults(text, score) {
  const colors = scoreColor(score);
  const sections = text.split(/\n(?=##\s)/);
  let verdictHtml = '';
  let bodyHtml = '';

  sections.forEach(section => {
    section = section.trim();
    if (!section) return;

    // Skip credibility rating — rendered as badge
    if (section.startsWith('## Credibility Rating')) return;

    if (section.startsWith('## Verdict')) {
      const lines = section.split('\n').filter(l => l.trim());
      const verdictText = lines.slice(1).join(' ').trim();
      const vs = verdictStyle(verdictText);
      verdictHtml = '<div style="background:' + vs.bg + ';border:1px solid ' + vs.border + ';border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;">' +
        '<span style="font-size:20px;color:' + vs.iconColor + ';">' + vs.icon + '</span>' +
        '<div><div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:' + vs.iconColor + ';margin-bottom:3px;">Verdict</div>' +
        '<div style="font-size:14px;color:#f0ece3;">' + verdictText + '</div></div></div>';
      return;
    }

    if (section.startsWith('## Red Flags')) {
      const lines = section.split('\n').filter(l => l.trim());
      const items = lines.slice(1).filter(l => l.trim().startsWith('-'));
      let itemsHtml = '';
      const hasRealFlags = items.some(i => !i.toLowerCase().includes('none'));
      items.forEach(item => {
        const content = item.replace(/^-\s*/, '').trim();
        const isNone = content.toLowerCase().startsWith('none');
        itemsHtml += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">' +
          '<span style="color:' + (isNone ? '#00d4b4' : '#ff6b5b') + ';flex-shrink:0;">' + (isNone ? '✓' : '⚠') + '</span>' +
          '<span style="font-size:14px;color:rgba(240,236,227,0.8);">' + content + '</span></div>';
      });
      bodyHtml += '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px 24px;margin-bottom:16px;">' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.5);text-transform:uppercase;margin-bottom:12px;">Red Flags</div>' +
        itemsHtml + '</div>';
      return;
    }

    if (section.startsWith('## Strengths')) {
      const lines = section.split('\n').filter(l => l.trim());
      const items = lines.slice(1).filter(l => l.trim().startsWith('-'));
      let itemsHtml = '';
      items.forEach(item => {
        const content = item.replace(/^-\s*/, '').trim();
        itemsHtml += '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">' +
          '<span style="color:#00d4b4;flex-shrink:0;">✓</span>' +
          '<span style="font-size:14px;color:rgba(240,236,227,0.8);">' + content + '</span></div>';
      });
      bodyHtml += '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px 24px;margin-bottom:16px;">' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.5);text-transform:uppercase;margin-bottom:12px;">Strengths</div>' +
        itemsHtml + '</div>';
      return;
    }

    if (section.startsWith('##')) {
      const lines = section.split('\n').filter(l => l.trim());
      const title = lines[0].replace('## ', '');
      const body = lines.slice(1).join(' ').trim();
      bodyHtml += '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px 24px;margin-bottom:16px;">' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.5);text-transform:uppercase;margin-bottom:10px;">' + title + '</div>' +
        '<p style="margin:0;font-size:14px;color:rgba(240,236,227,0.8);line-height:1.6;">' + body + '</p></div>';
    }
  });

  return '<div style="display:flex;justify-content:center;margin-bottom:28px;">' +
    '<div style="text-align:center;">' +
    '<div style="width:80px;height:80px;border-radius:50%;background:' + colors.bg + ';color:' + colors.text + ';font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">' + score + '</div>' +
    '<div style="font-size:11px;color:rgba(240,236,227,0.4);letter-spacing:1px;text-transform:uppercase;">Credibility Score</div>' +
    '<div style="font-size:11px;color:rgba(240,236,227,0.3);margin-top:2px;">out of 10</div>' +
    '</div></div>' +
    bodyHtml +
    (verdictHtml ? verdictHtml + '<div style="margin-bottom:16px;"></div>' : '') +
    '<button onclick="resetForm()" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.6);padding:12px 24px;border-radius:100px;font-size:13px;cursor:pointer;margin-top:8px;font-family:Arial,sans-serif;width:100%;">Evaluate Another Source</button>';
}

async function evaluateSource() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const text = sourceInput.value.trim();

  if (!apiKey) { showWarn('Please enter your Anthropic API key above.'); return; }
  if (!text) { showWarn('Please paste a URL, abstract, or article excerpt first.'); return; }
  if (text.length < 30) { showWarn('Please provide more content for a meaningful evaluation.'); return; }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const results = document.getElementById('results');

  btn.style.display = 'none';
  spinner.style.display = 'block';
  results.style.display = 'none';

  const userMessage = (selectedType ? 'Source type context: ' + selectedType + '\n\n' : '') + text;

  const systemPrompt = `You are an academic source evaluation tool for first-year students.
Evaluate the submitted source and respond in exactly this format:

## Source Type
[Identify what kind of source this is]

## Credibility Rating: [X/10]
[2 sentences explaining the rating]

## Strengths
- [strength 1]
- [strength 2]
- [strength 3 if applicable]

## Red Flags
- [red flag 1 or 'None identified']
- [red flag 2 if applicable]

## Bias Indicators
[1-2 sentences on any potential bias]

## Verdict
[One sentence: suitable for academic use / use with caution / not recommended]

Be educational — explain WHY, not just what.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-request-source': 'browser'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error && err.error.message ? err.error.message : 'API error ' + response.status);
    }

    const data = await response.json();
    const feedbackText = data.content[0].text;

    // Extract score
    const scoreMatch = feedbackText.match(/Credibility Rating:\s*\[?(\d+)\s*\/\s*10\]?/i);
    const score = scoreMatch ? parseInt(scoreMatch[1]) : 5;

    results.innerHTML = renderResults(feedbackText, score);
    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    results.innerHTML = '<div style="background:rgba(255,107,91,0.1);border:1px solid rgba(255,107,91,0.3);border-radius:12px;padding:20px 24px;color:#ff6b5b;font-size:14px;line-height:1.5;">' +
      '<strong>Something went wrong</strong><br>' + (err.message || 'Please check your API key and try again.') + '</div>';
    results.style.display = 'block';
  } finally {
    spinner.style.display = 'none';
    btn.style.display = 'block';
  }
}

function resetForm() {
  sourceInput.value = '';
  charCount.textContent = '0 characters';
  selectedType = '';
  document.querySelectorAll('.type-btn').forEach(b => {
    b.style.background = '#0f0f1c';
    b.style.borderColor = 'rgba(255,255,255,0.12)';
    b.style.color = 'rgba(240,236,227,0.7)';
  });
  document.getElementById('results').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
