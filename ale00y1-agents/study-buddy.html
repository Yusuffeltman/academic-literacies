<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ALE00Y1 · Study Buddy</title>
<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 4px #00d4b4; }
  50% { box-shadow: 0 0 10px #00d4b4, 0 0 16px #00d4b4; }
}
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body style="margin:0;padding:0;background:#08080f;color:#f0ece3;font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;">

<!-- Header -->
<div style="background:linear-gradient(135deg,#0f0f1c,#12121f);border-bottom:1px solid rgba(0,212,180,0.2);padding:16px 24px;flex-shrink:0;">
  <div style="max-width:740px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:10px;letter-spacing:3px;color:#00d4b4;text-transform:uppercase;margin-bottom:3px;font-weight:700;">ALE00Y1 · Academic Literacies</div>
      <h1 style="margin:0;font-size:20px;font-weight:800;color:#f0ece3;">Study Buddy</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#00d4b4;animation:pulse 2s infinite;"></div>
      <span style="font-size:12px;color:rgba(240,236,227,0.5);">Online</span>
    </div>
  </div>
</div>

<!-- API Key bar -->
<div id="apiBar" style="background:#0f0f1c;border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 24px;flex-shrink:0;">
  <div style="max-width:740px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <input id="apiKey" type="password" placeholder="Anthropic API Key (sk-ant-...)" style="flex:1;min-width:200px;background:#08080f;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#f0ece3;font-size:13px;font-family:Arial,sans-serif;outline:none;" />
    <button onclick="startChat()" style="background:linear-gradient(135deg,#00d4b4,#4fc3f7);color:#08080f;font-weight:700;padding:10px 20px;border-radius:8px;font-size:13px;border:none;cursor:pointer;white-space:nowrap;font-family:Arial,sans-serif;">Start Chat</button>
    <div id="keyStatus" style="font-size:11px;color:rgba(240,236,227,0.35);width:100%;margin-top:2px;">Enter your API key to begin.</div>
  </div>
</div>

<!-- Chat window -->
<div style="flex:1;display:flex;flex-direction:column;max-width:740px;width:100%;margin:0 auto;box-sizing:border-box;padding:0 16px;">

  <div id="chatWindow" style="flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:12px;min-height:0;max-height:480px;"></div>

  <!-- Input area -->
  <div style="border-top:1px solid rgba(255,255,255,0.06);padding:16px 0;flex-shrink:0;">
    <div style="display:flex;gap:10px;align-items:flex-end;">
      <textarea id="userInput" placeholder="Ask about academic writing, citations, AI literacy, research skills..." rows="1" disabled
        style="flex:1;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#f0ece3;font-size:14px;font-family:Arial,sans-serif;resize:none;outline:none;line-height:1.4;min-height:44px;max-height:120px;box-sizing:border-box;opacity:0.5;"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()" disabled
        style="background:linear-gradient(135deg,#00d4b4,#4fc3f7);color:#08080f;font-weight:800;width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;font-size:18px;flex-shrink:0;opacity:0.5;display:flex;align-items:center;justify-content:center;">
        ➤
      </button>
    </div>
    <div style="font-size:11px;color:rgba(240,236,227,0.25);margin-top:8px;text-align:center;">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<!-- Footer -->
<div style="text-align:center;padding:12px;font-size:11px;color:rgba(240,236,227,0.2);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;">
  ALE00Y1 · Academic Literacies · UJ · 2026
</div>

<script>
let conversationHistory = [];
let isWaiting = false;
let chatStarted = false;
let apiKeyValue = '';

const WELCOME_TEXT = "Hi! I'm your ALE00Y1 Study Buddy 👋 I can help you with academic writing, understanding AI literacy, citation styles, building arguments, and research skills. What would you like to explore today?";

const SYSTEM_PROMPT = `You are a friendly, encouraging study buddy for ALE00Y1 — Academic Literacies in the Era of AI at UJ. You help first-year students with:
- Academic reading and critical thinking
- Writing essays, paragraphs and arguments
- Understanding and using AI tools responsibly
- Citation and referencing (APA 7th edition)
- Evaluating sources and avoiding misinformation
- Research skills and database searching

Keep responses conversational and under 150 words unless the student asks for a detailed explanation. Use simple language. Be encouraging. If asked something outside these topics, gently redirect back to academic literacies. Never write essays for students — guide them instead. Use occasional relevant emojis to stay friendly.`;

function getTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const cw = document.getElementById('chatWindow');
  cw.scrollTop = cw.scrollHeight;
}

function renderMessage(role, text) {
  const cw = document.getElementById('chatWindow');
  const isUser = role === 'user';
  const time = getTime();

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;animation:fadeSlideIn 0.25s ease;' + (isUser ? 'align-items:flex-end;' : 'align-items:flex-start;');

  const bubble = document.createElement('div');
  bubble.style.cssText = isUser
    ? 'background:#00d4b4;color:#08080f;border-radius:18px 18px 4px 18px;padding:10px 16px;max-width:75%;font-size:14px;line-height:1.5;word-wrap:break-word;'
    : 'background:#0f0f1c;border:1px solid rgba(255,255,255,0.08);color:#f0ece3;border-radius:18px 18px 18px 4px;padding:10px 16px;max-width:75%;font-size:14px;line-height:1.5;word-wrap:break-word;';

  bubble.textContent = text;

  const timestamp = document.createElement('div');
  timestamp.style.cssText = 'font-size:10px;color:rgba(240,236,227,0.3);margin-top:4px;padding:0 4px;';
  timestamp.textContent = time;

  wrapper.appendChild(bubble);
  wrapper.appendChild(timestamp);
  cw.appendChild(wrapper);
  scrollToBottom();
  return bubble;
}

function showTypingIndicator() {
  const cw = document.getElementById('chatWindow');
  const wrapper = document.createElement('div');
  wrapper.id = 'typingIndicator';
  wrapper.style.cssText = 'display:flex;align-items:flex-start;';

  const bubble = document.createElement('div');
  bubble.style.cssText = 'background:#0f0f1c;border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;padding:12px 16px;display:flex;gap:4px;align-items:center;';

  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('span');
    dot.style.cssText = 'display:inline-block;width:7px;height:7px;border-radius:50%;background:#00d4b4;animation:dotBounce 1.2s ease-in-out ' + (i * 0.2) + 's infinite;';
    bubble.appendChild(dot);
  }

  const label = document.createElement('span');
  label.style.cssText = 'font-size:12px;color:rgba(240,236,227,0.4);margin-left:8px;';
  label.textContent = 'Study Buddy is thinking...';
  bubble.appendChild(label);

  wrapper.appendChild(bubble);
  cw.appendChild(wrapper);
  scrollToBottom();
}

function hideTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setInputEnabled(enabled) {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  input.disabled = !enabled;
  btn.disabled = !enabled;
  input.style.opacity = enabled ? '1' : '0.5';
  btn.style.opacity = enabled ? '1' : '0.5';
  if (enabled) input.focus();
}

function startChat() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || !key.startsWith('sk-')) {
    document.getElementById('keyStatus').style.color = '#ff6b5b';
    document.getElementById('keyStatus').textContent = 'Please enter a valid Anthropic API key (starts with sk-ant-...).';
    return;
  }
  apiKeyValue = key;
  chatStarted = true;

  document.getElementById('keyStatus').style.color = '#00d4b4';
  document.getElementById('keyStatus').textContent = '✓ Connected — chat is ready!';
  document.getElementById('apiKey').disabled = true;
  document.querySelector('#apiBar button').disabled = true;
  document.querySelector('#apiBar button').style.opacity = '0.5';

  setInputEnabled(true);
  renderMessage('assistant', WELCOME_TEXT);
}

function handleKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  if (isWaiting || !chatStarted) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = '44px';

  renderMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isWaiting = true;
  setInputEnabled(false);
  showTypingIndicator();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKeyValue,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-request-source': 'browser'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error && err.error.message ? err.error.message : 'API error ' + response.status);
    }

    const data = await response.json();
    const replyText = data.content[0].text;

    conversationHistory.push({ role: 'assistant', content: replyText });
    hideTypingIndicator();
    renderMessage('assistant', replyText);

  } catch (err) {
    hideTypingIndicator();
    const errMsg = "Sorry, I couldn't connect right now. Please try again in a moment 🔄";
    renderMessage('assistant', errMsg);
  } finally {
    isWaiting = false;
    setInputEnabled(true);
  }
}
</script>
</body>
</html>
