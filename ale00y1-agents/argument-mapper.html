<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALE00Y1 · Argument Mapper</title>
<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body style="margin:0;padding:0;background:#08080f;color:#f0ece3;font-family:Arial,sans-serif;min-height:100vh;">

<!-- Header -->
<div style="background:linear-gradient(135deg,#0f0f1c,#12121f);border-bottom:1px solid rgba(0,212,180,0.2);padding:20px 24px;text-align:center;">
  <div style="max-width:900px;margin:0 auto;">
    <div style="font-size:11px;letter-spacing:3px;color:#00d4b4;text-transform:uppercase;margin-bottom:6px;font-weight:700;">ALE00Y1 · Academic Literacies</div>
    <h1 style="margin:0;font-size:26px;font-weight:800;background:linear-gradient(135deg,#9b7fe8,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Argument Mapper</h1>
    <p style="margin:8px 0 0;font-size:13px;color:rgba(240,236,227,0.5);">Visualise the argument structure of your writing</p>
  </div>
</div>

<!-- Main -->
<div style="max-width:900px;margin:0 auto;padding:32px 24px;">

  <!-- API Key -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Anthropic API Key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-..." style="width:100%;box-sizing:border-box;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;color:#f0ece3;font-size:14px;font-family:Arial,sans-serif;outline:none;" />
    <div style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;">Your key is never stored — it only lives in this page session.</div>
  </div>

  <!-- Input -->
  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:12px;font-weight:700;color:rgba(240,236,227,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Your Paragraph or Essay Section</label>
    <textarea id="textInput" placeholder="Paste your paragraph, argument, or essay section here..." style="width:100%;box-sizing:border-box;background:#0f0f1c;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px;color:#f0ece3;font-size:15px;font-family:Arial,sans-serif;min-height:180px;resize:vertical;outline:none;line-height:1.6;"></textarea>
  </div>

  <!-- Warning -->
  <div id="warnMsg" style="display:none;background:rgba(255,107,91,0.12);border:1px solid rgba(255,107,91,0.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px;color:#ff6b5b;"></div>

  <!-- Button -->
  <button id="submitBtn" onclick="mapArgument()" style="background:linear-gradient(135deg,#00d4b4,#4fc3f7);color:#08080f;font-weight:800;padding:14px 28px;border-radius:100px;font-size:15px;border:none;cursor:pointer;width:100%;letter-spacing:0.5px;">Map the Argument</button>

  <!-- Spinner -->
  <div id="spinner" style="display:none;text-align:center;padding:40px 0;">
    <div style="width:36px;height:36px;border:3px solid rgba(155,127,232,0.2);border-top-color:#9b7fe8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
    <div style="font-size:13px;color:rgba(240,236,227,0.5);">Mapping your argument...</div>
  </div>

  <!-- Results -->
  <div id="results" style="display:none;margin-top:32px;animation:fadeIn 0.4s ease;"></div>

</div>

<!-- Footer -->
<div style="text-align:center;padding:24px;font-size:11px;color:rgba(240,236,227,0.25);border-top:1px solid rgba(255,255,255,0.05);margin-top:20px;">
  ALE00Y1 · Academic Literacies · UJ · 2026
</div>

<script>
const textInput = document.getElementById('textInput');
textInput.addEventListener('focus', function() { this.style.borderColor = 'rgba(155,127,232,0.5)'; });
textInput.addEventListener('blur', function() { this.style.borderColor = 'rgba(255,255,255,0.1)'; });

function showWarn(msg) {
  const w = document.getElementById('warnMsg');
  w.textContent = msg;
  w.style.display = 'block';
  setTimeout(() => { w.style.display = 'none'; }, 4000);
}

function dots(score, max, color) {
  let html = '';
  for (let i = 1; i <= max; i++) {
    html += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;background:' +
      (i <= score ? color : 'rgba(255,255,255,0.1)') + ';"></span>';
  }
  return html;
}

function overallColor(score) {
  if (score >= 8) return { bg: '#00d4b4', text: '#08080f' };
  if (score >= 5) return { bg: '#ffd166', text: '#08080f' };
  return { bg: '#ff6b5b', text: '#ffffff' };
}

function reasoningExplain(type) {
  const map = {
    deductive: 'Reasoning from general principles to specific conclusions.',
    inductive: 'Building general conclusions from specific observations.',
    abductive: 'Choosing the most likely explanation from available evidence.'
  };
  return map[(type || '').toLowerCase()] || 'Reasoning from evidence to conclusions.';
}

function renderMap(data) {
  const oc = overallColor(data.overall_score || 5);
  let html = '';

  // Main claim card
  html += '<div style="margin-bottom:24px;">';
  html += '<div style="background:rgba(155,127,232,0.1);border:1px solid #9b7fe8;border-radius:14px;padding:20px 24px;text-align:center;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:3px;color:#9b7fe8;text-transform:uppercase;margin-bottom:10px;">Main Claim</div>';
  html += '<div style="font-size:17px;color:#f0ece3;line-height:1.5;font-weight:600;">' + (data.main_claim || 'Not identified') + '</div>';
  html += '<div style="margin-top:12px;">' + dots(data.claim_strength || 0, 5, '#9b7fe8') + '</div>';
  html += '<div style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;">Claim strength: ' + (data.claim_strength || 0) + '/5</div>';
  html += '</div></div>';

  // Evidence + Gaps (two columns)
  html += '<div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;">';

  // Evidence
  html += '<div style="flex:1;min-width:240px;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#00d4b4;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;"><span>✓</span> Evidence</div>';
  const evidence = data.evidence || [];
  if (evidence.length === 0) {
    html += '<div style="background:#0f0f1c;border:1px solid rgba(0,212,180,0.2);border-radius:10px;padding:14px 16px;font-size:13px;color:rgba(240,236,227,0.5);">No clear evidence identified.</div>';
  } else {
    evidence.forEach(e => {
      html += '<div style="background:#0f0f1c;border:1px solid rgba(0,212,180,0.2);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;gap:10px;">';
      html += '<span style="color:#00d4b4;flex-shrink:0;font-size:16px;">✓</span>';
      html += '<span style="font-size:13px;color:rgba(240,236,227,0.85);line-height:1.5;">' + e + '</span>';
      html += '</div>';
    });
  }
  html += '<div style="font-size:11px;color:rgba(240,236,227,0.35);margin-top:6px;">Evidence quality: ' + dots(data.evidence_quality || 0, 5, '#00d4b4') + '</div>';
  html += '</div>';

  // Logical Gaps
  html += '<div style="flex:1;min-width:240px;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#ffd166;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;"><span>⚠</span> Logical Gaps</div>';
  const gaps = data.logical_gaps || [];
  if (gaps.length === 0) {
    html += '<div style="background:#0f0f1c;border:1px solid rgba(0,212,180,0.2);border-radius:10px;padding:14px 16px;display:flex;gap:10px;font-size:13px;color:#00d4b4;">' +
      '<span>✓</span><span>No significant gaps identified</span></div>';
  } else {
    gaps.forEach(g => {
      html += '<div style="background:#0f0f1c;border:1px solid rgba(255,209,102,0.25);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;gap:10px;">';
      html += '<span style="color:#ffd166;flex-shrink:0;font-size:16px;">⚠</span>';
      html += '<span style="font-size:13px;color:rgba(240,236,227,0.85);line-height:1.5;">' + g + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';
  html += '</div>';

  // Counter-arguments
  html += '<div style="margin-bottom:24px;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#4fc3f7;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;"><span>↔</span> Counter-Arguments</div>';
  const counters = data.counter_arguments || [];
  if (counters.length === 0) {
    html += '<div style="background:#0f0f1c;border:1px solid rgba(79,195,247,0.2);border-radius:10px;padding:14px 16px;font-size:13px;color:rgba(79,195,247,0.7);">No counter-arguments acknowledged — consider addressing opposing views to strengthen your argument.</div>';
  } else {
    html += '<div style="background:#0f0f1c;border:1px solid rgba(79,195,247,0.2);border-radius:10px;padding:14px 16px;">';
    counters.forEach((c, i) => {
      html += '<div style="display:flex;gap:10px;' + (i > 0 ? 'margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);' : '') + '">';
      html += '<span style="color:#4fc3f7;flex-shrink:0;">↔</span>';
      html += '<span style="font-size:13px;color:rgba(240,236,227,0.85);line-height:1.5;">' + c + '</span></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Reasoning type
  const rType = (data.reasoning_type || 'unknown');
  html += '<div style="margin-bottom:24px;display:flex;align-items:center;gap:12px;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.4);text-transform:uppercase;">Reasoning Type:</div>';
  html += '<div style="background:rgba(240,236,227,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:6px 16px;font-size:13px;font-weight:700;color:#f0ece3;position:relative;" title="' + reasoningExplain(rType) + '">';
  html += rType.charAt(0).toUpperCase() + rType.slice(1).toLowerCase();
  html += '</div>';
  html += '<div style="font-size:12px;color:rgba(240,236,227,0.4);">' + reasoningExplain(rType) + '</div>';
  html += '</div>';

  // Overall score + improvement
  html += '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:24px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:24px;align-items:center;">';
  html += '<div style="text-align:center;flex-shrink:0;">';
  html += '<div style="width:70px;height:70px;border-radius:50%;background:' + oc.bg + ';color:' + oc.text + ';font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;">' + (data.overall_score || 0) + '</div>';
  html += '<div style="font-size:11px;color:rgba(240,236,227,0.4);letter-spacing:1px;">Overall</div>';
  html += '</div>';
  html += '<div style="flex:1;min-width:200px;">';
  html += '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#ffd166;text-transform:uppercase;margin-bottom:8px;">One Thing to Improve</div>';
  html += '<div style="font-size:15px;color:#f0ece3;line-height:1.5;">' + (data.one_improvement || 'No suggestion provided.') + '</div>';
  html += '</div></div>';

  html += '<button onclick="resetForm()" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.6);padding:12px 24px;border-radius:100px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;width:100%;">Map Another Piece of Writing</button>';

  return html;
}

async function mapArgument() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const text = textInput.value.trim();

  if (!apiKey) { showWarn('Please enter your Anthropic API key above.'); return; }
  if (!text) { showWarn('Please paste your writing first.'); return; }
  if (text.length < 50) { showWarn('Please paste at least a paragraph for meaningful analysis.'); return; }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const results = document.getElementById('results');

  btn.style.display = 'none';
  spinner.style.display = 'block';
  results.style.display = 'none';

  const systemPrompt = `You are an argument analysis tool for academic writing.
Analyse the text and respond in ONLY valid JSON with this structure:
{
  "main_claim": "string — the central argument in one sentence",
  "claim_strength": number 1-5,
  "evidence": ["evidence point 1", "evidence point 2"],
  "evidence_quality": number 1-5,
  "counter_arguments": ["counter-arg acknowledged, or empty array if none"],
  "logical_gaps": ["gap 1", "gap 2", or empty array if none],
  "reasoning_type": "deductive or inductive or abductive",
  "overall_score": number 1-10,
  "one_improvement": "single most important thing to improve"
}
Return ONLY the JSON. No explanation text outside the JSON.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-request-source': 'browser'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error && err.error.message ? err.error.message : 'API error ' + response.status);
    }

    const data = await response.json();
    let responseText = data.content[0].text.trim();

    // Strip markdown fences if present
    responseText = responseText.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(responseText);
    } catch (e) {
      results.innerHTML = '<div style="background:#0f0f1c;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px 24px;">' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(240,236,227,0.4);text-transform:uppercase;margin-bottom:10px;">Analysis Result</div>' +
        '<p style="margin:0;font-size:14px;color:rgba(240,236,227,0.8);line-height:1.6;white-space:pre-wrap;">' + responseText + '</p>' +
        '<button onclick="resetForm()" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(240,236,227,0.6);padding:12px 24px;border-radius:100px;font-size:13px;cursor:pointer;margin-top:16px;font-family:Arial,sans-serif;width:100%;">Try Another</button>' +
        '</div>';
      results.style.display = 'block';
      return;
    }

    results.innerHTML = renderMap(parsed);
    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    results.innerHTML = '<div style="background:rgba(255,107,91,0.1);border:1px solid rgba(255,107,91,0.3);border-radius:12px;padding:20px 24px;color:#ff6b5b;font-size:14px;line-height:1.5;">' +
      '<strong>Something went wrong</strong><br>' + (err.message || 'Please check your API key and try again.') + '</div>';
    results.style.display = 'block';
  } finally {
    spinner.style.display = 'none';
    btn.style.display = 'block';
  }
}

function resetForm() {
  textInput.value = '';
  document.getElementById('results').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
